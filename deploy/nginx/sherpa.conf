server {
    listen 80;
    server_name sherpa.ncsa.illinois.edu;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name sherpa.ncsa.illinois.edu;

    ssl_certificate     /etc/letsencrypt/live/sherpa.ncsa.illinois.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sherpa.ncsa.illinois.edu/privkey.pem;

    location / {
        proxy_pass http://host.docker.internal:8501;
        proxy_http_version 1.1;

        # websockets for Streamlit
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # forward headers
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}
